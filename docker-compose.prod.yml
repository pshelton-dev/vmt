# Production compose for a remote host that PULLS the image from a registry.
# The image is built and pushed from your laptop; the remote never builds.
#
# Set VMT_IMAGE in the .env on the remote (e.g. ghcr.io/OWNER/vmt:latest).
# Copy this file + .env to the server once; then `docker compose -f this pull && up -d`.
services:
  app:
    image: ${VMT_IMAGE:?set VMT_IMAGE, e.g. ghcr.io/OWNER/vmt:latest}
    restart: unless-stopped
    environment:
      VMT_ADMIN_PASSWORD: ${VMT_ADMIN_PASSWORD:-}
      VMT_CURRENCY: ${VMT_CURRENCY:-$$}
      VMT_DISTANCE_UNIT: ${VMT_DISTANCE_UNIT:-mi}
      VMT_DATE_FORMAT: ${VMT_DATE_FORMAT:-Jan 2, 2006}
      TZ: ${TZ:-UTC}
      VMT_BASE_URL: ${VMT_BASE_URL:-https://vmt.int.paulandjenn.com}
      VMT_SMTP_HOST: ${VMT_SMTP_HOST:-}
      VMT_SMTP_PORT: ${VMT_SMTP_PORT:-587}
      VMT_SMTP_USER: ${VMT_SMTP_USER:-}
      VMT_SMTP_PASS: ${VMT_SMTP_PASS:-}
      VMT_SMTP_FROM: ${VMT_SMTP_FROM:-}
      VMT_SMTP_TLS: ${VMT_SMTP_TLS:-starttls}
    volumes:
      - vmt_data:/data
    # No published host port: the app is reached over the udBridge network
    # (e.g. by the reverse proxy at vmt-app:8080). It listens on 8080 internally.
    expose:
      - "8080"
    networks:
      - udBridge

volumes:
  vmt_data:
    name: vmt_data   # fixed name (no project prefix) so recreation can't strand data

networks:
  # Existing external network (e.g. shared with the reverse proxy). It must
  # already exist on the host: `docker network create udBridge` if not.
  udBridge:
    external: true
