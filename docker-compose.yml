services:
  app:
    build: .
    image: vmt:latest
    restart: unless-stopped
    environment:
      # Bootstraps the admin password on first run only. After setup you may
      # remove this; the hash is stored in the database.
      VMT_ADMIN_PASSWORD: ${VMT_ADMIN_PASSWORD:-}
      VMT_CURRENCY: ${VMT_CURRENCY:-$$}
      VMT_DISTANCE_UNIT: ${VMT_DISTANCE_UNIT:-mi}
      VMT_DATE_FORMAT: ${VMT_DATE_FORMAT:-Jan 2, 2006}
      TZ: ${TZ:-UTC}
      # Public base URL of the app (used for links in notification emails).
      VMT_BASE_URL: ${VMT_BASE_URL:-https://vmt.int.paulandjenn.com}
      # Outbound email (SMTP) for reminder notifications. Leave blank to disable.
    volumes:
      - vmt_data:/data
    # No published host port: the app is reached over the udBridge network
    # (e.g. by the reverse proxy at vmt-app:8080). It listens on 8080 internally.
    expose:
      - "8080"
    networks:
      - udBridge

volumes:
  # Pre-existing named volume, managed outside Compose so recreation (or even
  # `down -v`) can never strand or delete the data. Create it once on a fresh
  # host:  docker volume create vmt_data
  vmt_data:
    external: true
    name: vmt_data

networks:
  # Existing external network (e.g. shared with the reverse proxy). It must
  # already exist on the host: `docker network create udBridge` if not.
  udBridge:
    external: true
