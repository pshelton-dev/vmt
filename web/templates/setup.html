{{define "content"}}
<div class="card auth-card">
  <h1>🔧 Welcome to VMT</h1>
  <p class="muted">Set a password to protect your maintenance records.</p>
  <form method="post" action="/setup">
    <label>New password
      <input type="password" name="password" minlength="6" autofocus required>
    </label>
    <label>Confirm password
      <input type="password" name="confirm" minlength="6" required>
    </label>
    <button type="submit" class="primary">Create &amp; sign in</button>
  </form>
</div>
{{end}}
