{{define "content"}}
{{with .Data}}
{{$s := .Service}}
<div class="page-head">
  <h1>{{if .IsNew}}Add service{{else}}Edit service{{end}}</h1>
  <p class="muted">{{.Vehicle.Name}}</p>
</div>
<form class="card form" method="post" action="{{.Action}}" enctype="multipart/form-data">
  <div class="grid2">
    <label>Date *
      <input type="date" name="date" value="{{$s.Date}}" required>
    </label>
    <label>Odometer
      <input type="number" name="odometer" min="0" value="{{if $s.Odometer}}{{deref64 $s.Odometer}}{{end}}">
    </label>
    <label>Category
      <select name="category">
        {{range .Categories}}<option value="{{.}}" {{if eq . $s.Category}}selected{{end}}>{{.}}</option>{{end}}
      </select>
    </label>
    <label>Cost
      <input type="number" name="cost" step="0.01" min="0" value="{{if $s.Cost}}{{printf "%.2f" $s.Cost}}{{end}}">
    </label>
  </div>
  <label>Description *
    <input name="description" value="{{$s.Description}}" required placeholder="Synthetic oil change + filter">
  </label>
  <label>Vendor / shop
    <input name="vendor" value="{{$s.Vendor}}">
  </label>
  <label>Notes
    <textarea name="notes" rows="3">{{$s.Notes}}</textarea>
  </label>
  <label>Receipt / document
    <input type="file" name="document">
  </label>
  <div class="actions">
    <button type="submit" class="primary">Save</button>
    <a class="btn" href="/vehicles/{{.Vehicle.ID}}">Cancel</a>
  </div>
</form>
{{end}}
{{end}}
